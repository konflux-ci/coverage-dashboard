name: konflux-ci/mintmaker
exclude_dirs:
    - vendor/
    - .github/
    - .tekton/
    - hack/
    - proto/
    - cmd/
    - api/v1alpha1
    - /fake(/|$)
    - /mock(s)?(/|$)
    - /e2e(-tests)?(/|$)
    - docs/
exclude_files:
    - zz_generated.deepcopy.go
    - openapi_generated.go
    - '*.pb.go'
    - mock_*.go
    - '*_mock.go'
